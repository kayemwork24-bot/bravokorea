<body>

  <!-- site header -->
  <header class="nav">
    <div class="wrap nav__inner">
      <a class="logo" href="#/" aria-label="Bravo Korea">
        <img class="logo__img" src="assets/bk-logo.svg?v=19" alt="Bravo Korea" width="152" height="22">

      <label class="nav__search" id="nav-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B8D98" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search-input" placeholder="글, 주제, 사람 검색…">
      </label>

      <div class="nav__spacer"></div>

      <nav class="nav__menu" id="nav-menu" aria-label="Primary">

  <main id="app"></main>

  <div class="drawer-back" id="drawer" hidden>

      <div class="drawer__head">
        <img class="drawer__logo" src="assets/bk-logo.svg?v=19" alt="Bravo Korea" width="140" height="20">
        <button class="drawer__x" id="drawer-close" aria-label="메뉴 닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <nav class="drawer__nav" id="drawer-nav"></nav>
    </aside>
  </div>

  <!-- overlays -->
  <div class="sheet-back" id="sheet"></div>
  <div class="toast" id="toast"></div>
